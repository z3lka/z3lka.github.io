    <style>
      /* Loading animation for page transitions */
      .page-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        animation: loading 1.5s ease-in-out infinite;
        z-index: 1000;
      }
      @keyframes loading {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
    </style>

    <script>
      // Add loading animation for post card clicks
      document.addEventListener('DOMContentLoaded', function () {
        const postCards = document.querySelectorAll('.post-card a');
        postCards.forEach(card => {
          card.addEventListener('click', function (e) { // Add loading indicator
            const loadingBar = document.createElement('div');
            loadingBar.className = 'page-loading';
            document.body.appendChild(loadingBar);
            // Add click animation to the card
            const cardElement = this.closest('.post-card');
            cardElement.style.transform = 'translateY(-2px) scale(0.98)';
            cardElement.style.opacity = '0.9';
            // Remove loading bar after a short delay (simulating page load)
            setTimeout(() => {
              if (loadingBar.parentNode) {
                loadingBar.parentNode.removeChild(loadingBar);
              }
            }, 800);
          });
        });
      });
    </script>
